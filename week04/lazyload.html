<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="styles/lazyload.css">

<body>

        <h1>Lazy Loading Image Gallery</h1>

        <img src="https://picsum.photos/id/60/400/600" alt="Mountain landscape with clouds" width="400" height="600" loading="lazy">
    </main>
